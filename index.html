<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIM Convert</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 520px; margin: 100px auto; padding: 0 24px; color: #111; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .subtitle { color: #888; margin: 6px 0 36px; font-size: 14px; }
  .drop { border: 1.5px dashed #d0d0d0; border-radius: 10px; padding: 44px 24px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .drop:hover, .drop.over { border-color: #111; background: #fafafa; }
  .drop span { font-size: 14px; color: #aaa; }
  .drop input { display: none; }
  #status { margin-top: 20px; font-size: 14px; color: #555; }
  #status.error { color: #c00; }
  .bar { background: #f0f0f0; border-radius: 3px; height: 4px; margin-top: 10px; overflow: hidden; }
  .bar div { height: 100%; width: 0%; background: #111; transition: width 0.3s; }
  a.dl { display: inline-block; margin-top: 14px; color: #111; font-weight: 500; font-size: 14px; text-decoration: underline; text-underline-offset: 3px; }
  a.dl:hover { color: #555; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 48px 0 28px; }
  h2 { font-size: 13px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  pre { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 8px; padding: 16px 20px; font-size: 13px; overflow-x: auto; line-height: 1.6; }
  code { font-family: 'SF Mono', Menlo, Consolas, monospace; color: #333; }
</style>
</head>
<body>
<h1>BIM Convert</h1>
<p class="subtitle">Convert Revit (.rvt) files to IFC. Max file size 500 MB.</p>
<div class="drop" id="drop">
  <span>Drop .rvt file here or click to browse</span>
  <input type="file" accept=".rvt" id="file">
</div>
<div id="status"></div>
<hr class="divider">
<h2>API</h2>
<pre><code id="curl"></code></pre>
<script>
document.getElementById('curl').textContent = `curl -X POST ${location.origin}/convert \\\n  -F "file=@MyBuilding.rvt" \\\n  --output MyBuilding.ifc`;
const drop = document.getElementById('drop');
const input = document.getElementById('file');
const status = document.getElementById('status');
drop.onclick = () => input.click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => { e.preventDefault(); drop.classList.remove('over'); if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]); };
input.onchange = () => { if (input.files[0]) upload(input.files[0]); };

async function upload(file) {
  if (!file.name.toLowerCase().endsWith('.rvt')) { show('Please select a .rvt file', true); return; }
  const name = file.name.replace(/\.rvt$/i, '.ifc');
  drop.style.display = 'none';
  show('<div class="bar"><div id="bar"></div></div>Uploading...', false);
  const form = new FormData();
  form.append('file', file);
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/convert');
  xhr.responseType = 'blob';
  xhr.upload.onprogress = e => { if (e.lengthComputable) { document.getElementById('bar').style.width = (e.loaded/e.total*50)+'%'; } };
  xhr.onprogress = () => { document.getElementById('bar').style.width = '75%'; status.childNodes[1].textContent = 'Converting...'; };
  xhr.onload = () => {
    if (xhr.status === 200) {
      document.getElementById('bar').style.width = '100%';
      const url = URL.createObjectURL(xhr.response);
      status.innerHTML = 'Done. <a class="dl" href="'+url+'" download="'+name+'">Download '+name+'</a>';
    } else {
      try { xhr.response.text().then(t => { const j = JSON.parse(t); show(j.error || 'Conversion failed', true); }); }
      catch { show('Conversion failed (HTTP '+xhr.status+')', true); }
    }
  };
  xhr.onerror = () => show('Network error', true);
  xhr.send(form);
}

function show(msg, err) {
  status.innerHTML = msg;
  status.className = err ? 'error' : '';
  if (err) { drop.style.display = ''; input.value = ''; }
}
</script>
</body>
</html>
